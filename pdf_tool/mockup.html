<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF Tool Mockup v2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060A14;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
  }

  /* ── Phone ── */
  .phone {
    width: 390px;
    height: 844px;
    background: #0A0F1C;
    border-radius: 54px;
    border: 2px solid #1E2540;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 0 1px #0D1226,
      0 40px 120px rgba(0,0,0,0.9),
      inset 0 1px 0 rgba(255,255,255,0.06);
  }

  /* notch */
  .notch {
    position: absolute;
    top: 14px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 34px;
    background: #000;
    border-radius: 20px;
    z-index: 20;
  }

  /* status bar */
  .status-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 54px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 28px 8px;
    z-index: 15;
  }
  .status-time { font-size: 13px; font-weight: 600; color: #fff; }
  .status-icons { display: flex; align-items: center; gap: 6px; }

  /* app bar */
  .app-bar {
    position: absolute;
    top: 54px; left: 0; right: 0;
    height: 52px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 10px;
    z-index: 15;
  }
  .app-icon {
    width: 30px; height: 30px;
    background: #7C5CFC;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 800; color: white; letter-spacing: -0.5px;
  }
  .app-title { font-size: 18px; font-weight: 700; color: #fff; }

  /* ── SPLIT SCREEN HALVES ── */
  .split-container {
    position: absolute;
    top: 106px; left: 0; right: 0;
    bottom: 0;
    display: flex;
  }

  /* LEFT — SPLIT (active) */
  .half-split {
    flex: 1;
    background: linear-gradient(160deg, #003D35 0%, #005A4A 40%, #007A64 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 18px 60px;
    position: relative;
    gap: 0;
  }
  .half-split::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #00E5FF08, #00C2A820);
    pointer-events: none;
  }

  /* RIGHT — MERGE (inactive) */
  .half-merge {
    flex: 1;
    background: #080C18;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 18px 60px;
    position: relative;
    gap: 0;
  }

  /* Mode label */
  .mode-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .half-split .mode-label { color: #00E5FFAA; }
  .half-merge .mode-label { color: #FF6B6B22; }

  /* Big icon */
  .mode-icon-wrap {
    width: 72px; height: 72px;
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
  }
  .half-split .mode-icon-wrap {
    background: rgba(0,229,255,0.15);
    box-shadow: 0 0 32px rgba(0,229,255,0.2);
  }
  .half-merge .mode-icon-wrap {
    background: rgba(255,107,107,0.05);
  }

  /* Action title */
  .mode-title {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
    text-align: center;
  }
  .half-split .mode-title { color: #fff; }
  .half-merge .mode-title { color: #1E2035; }

  /* Subtitle */
  .mode-sub {
    font-size: 11px;
    font-weight: 500;
    text-align: center;
    line-height: 1.5;
    margin-bottom: 28px;
  }
  .half-split .mode-sub { color: #00E5FF88; }
  .half-merge .mode-sub { color: #1E2035; }

  /* Action button inside each half */
  .mode-btn {
    width: 100%;
    height: 52px;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    letter-spacing: 0.2px;
    gap: 8px;
  }
  .half-split .mode-btn {
    background: linear-gradient(135deg, #00C2A8, #00E5FF);
    color: #001A18;
    box-shadow: 0 4px 20px rgba(0,229,255,0.4);
  }
  .half-merge .mode-btn {
    background: #0D0F1E;
    color: #1A1D30;
    border: 1px solid #12142A;
  }

  /* ── CENTRE TOGGLE ── */
  .center-toggle {
    position: absolute;
    top: 106px; bottom: 0;
    left: 50%; transform: translateX(-50%);
    width: 2px;
    background: linear-gradient(to bottom, transparent 0%, #0A0F1C 20%, #0A0F1C 80%, transparent 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .toggle-btn {
    width: 44px; height: 44px;
    background: #0A0F1C;
    border: 2px solid #00E5FF55;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow:
      0 0 0 6px #0A0F1C,
      0 0 24px rgba(0,229,255,0.3);
    position: relative;
    z-index: 11;
    flex-shrink: 0;
  }

  /* home indicator */
  .home-bar {
    position: absolute;
    bottom: 10px; left: 50%;
    transform: translateX(-50%);
    width: 130px; height: 5px;
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
    z-index: 20;
  }

  /* divider line in center of screen */
  .vline {
    position: absolute;
    top: 106px; bottom: 0;
    left: 50%;
    width: 1px;
    background: linear-gradient(to bottom, transparent, #00E5FF18 30%, #00E5FF18 70%, transparent);
    z-index: 5;
  }
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <rect x="0" y="6" width="3" height="6" rx="1" fill="white" opacity="0.4"/>
        <rect x="4.5" y="4" width="3" height="8" rx="1" fill="white" opacity="0.6"/>
        <rect x="9" y="2" width="3" height="10" rx="1" fill="white" opacity="0.8"/>
        <rect x="13.5" y="0" width="2.5" height="12" rx="1" fill="white"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 24 18" fill="none">
        <path d="M12 14.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5-1.5-.67-1.5-1.5.67-1.5 1.5-1.5z" fill="white"/>
        <path d="M12 10c1.93 0 3.68.78 4.95 2.05l1.41-1.41C16.72 9 14.46 8 12 8s-4.72 1-6.36 2.64l1.41 1.41C8.32 10.78 10.07 10 12 10z" fill="white" opacity="0.7"/>
        <path d="M12 6c3.07 0 5.84 1.24 7.85 3.25l1.41-1.41C18.99 5.48 15.71 4 12 4S5.01 5.48 2.74 7.84l1.41 1.41C6.16 7.24 8.93 6 12 6z" fill="white" opacity="0.4"/>
      </svg>
      <svg width="26" height="12" viewBox="0 0 26 12" fill="none">
        <rect x="0" y="1" width="22" height="10" rx="3" stroke="white" stroke-width="1.2" opacity="0.8"/>
        <rect x="22.5" y="3.5" width="2.5" height="5" rx="1.25" fill="white" opacity="0.5"/>
        <rect x="1.5" y="2.5" width="17" height="7" rx="2" fill="white"/>
      </svg>
    </div>
  </div>

  <!-- App bar -->
  <div class="app-bar">
    <div class="app-icon">PDF</div>
    <span class="app-title">PDF Tool</span>
  </div>

  <!-- Vertical divider -->
  <div class="vline"></div>

  <!-- Split container -->
  <div class="split-container">

    <!-- LEFT: SPLIT (active) -->
    <div class="half-split">
      <span class="mode-label">Split</span>
      <div class="mode-icon-wrap">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#00E5FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="6" cy="6" r="2.5"/>
          <circle cx="6" cy="18" r="2.5"/>
          <line x1="20" y1="4" x2="8.12" y2="15.88"/>
          <line x1="14.47" y1="14.48" x2="20" y2="20"/>
          <line x1="8.12" y1="8.12" x2="12" y2="12"/>
        </svg>
      </div>
      <span class="mode-title">Split</span>
      <span class="mode-sub">One file per page</span>
      <div class="mode-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Select PDF
      </div>
    </div>

    <!-- RIGHT: MERGE (inactive / dark) -->
    <div class="half-merge">
      <span class="mode-label">Merge</span>
      <div class="mode-icon-wrap">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#1E2035" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="8" height="8" rx="1.5"/>
          <rect x="13" y="3" width="8" height="8" rx="1.5"/>
          <rect x="3" y="13" width="8" height="8" rx="1.5"/>
          <rect x="13" y="13" width="8" height="8" rx="1.5"/>
        </svg>
      </div>
      <span class="mode-title">Merge</span>
      <span class="mode-sub">Combine into one</span>
      <div class="mode-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Select PDFs
      </div>
    </div>

  </div>

  <!-- Centre toggle button -->
  <div class="center-toggle">
    <div class="toggle-btn">
      <!-- swap arrows -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00E5FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="17 1 21 5 17 9"/>
        <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
        <polyline points="7 23 3 19 7 15"/>
        <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
      </svg>
    </div>
  </div>

  <div class="home-bar"></div>
</div>

</body>
</html>
